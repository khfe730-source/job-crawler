name: Crawl Jobs

on:
  schedule:
    # UTC 기준 6시간마다 실행 (KST 기준 9, 15, 21, 3시)
    # Gemini 무료 티어 실제 enforced RPD 20 한도 대응
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log version
        run: |
          echo "Branch:  ${{ github.ref_name }}"
          echo "Commit:  ${{ github.sha }}"
          echo "Trigger: ${{ github.event_name }}"
          git log -1 --format="%h %s (%an, %ar)"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore jobs.db cache
        uses: actions/cache@v4
        with:
          path: jobs.db
          key: jobs-db-${{ github.run_id }}
          restore-keys: |
            jobs-db-

      - name: Run crawler
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python main.py
